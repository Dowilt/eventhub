<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Main Screen -->
        <div id="main-screen" class="screen active">
            <header class="app-bar">
                <div class="app-bar-content" id="app-bar-normal">
                    <h1>EventHub</h1>
                    <div class="app-bar-actions">
                        <button class="icon-btn" id="btn-search" title="Поиск">
                            <span class="material-icons">search</span>
                        </button>
                        <button class="icon-btn" id="btn-sort" title="Сортировка">
                            <span class="material-icons">sort</span>
                        </button>
                        <button class="icon-btn" id="btn-stats" title="Статистика">
                            <span class="material-icons">pie_chart</span>
                        </button>
                    </div>
                </div>
                <div class="app-bar-content hidden" id="app-bar-search">
                    <button class="icon-btn" id="btn-search-back">
                        <span class="material-icons">arrow_back</span>
                    </button>
                    <input type="text" id="search-input" placeholder="Поиск по названию...">
                    <button class="icon-btn" id="btn-search-clear">
                        <span class="material-icons">close</span>
                    </button>
                </div>
                <!-- Sort popup -->
                <div class="sort-popup hidden" id="sort-popup">
                    <button class="sort-option" data-sort="date">По дате</button>
                    <button class="sort-option" data-sort="title">По названию</button>
                    <button class="sort-option" data-sort="category">По категории</button>
                </div>
            </header>

            <!-- Category filter chips -->
            <div class="chips-container" id="chips-container"></div>

            <!-- Statistics bar -->
            <div class="stats-bar" id="stats-bar"></div>

            <!-- Events grid -->
            <div class="events-grid" id="events-grid"></div>

            <!-- Empty state -->
            <div class="empty-state hidden" id="empty-state">
                <span class="material-icons">event_busy</span>
                <p>Нет событий</p>
            </div>

            <!-- FAB -->
            <button class="fab" id="btn-add">
                <span class="material-icons">add</span>
                <span>Событие</span>
            </button>
        </div>

        <!-- Detail Screen -->
        <div id="detail-screen" class="screen">
            <header class="app-bar detail-bar" id="detail-bar">
                <button class="icon-btn" id="btn-back">
                    <span class="material-icons">arrow_back</span>
                </button>
                <h1 id="detail-title"></h1>
                <button class="icon-btn" id="btn-edit" title="Редактировать">
                    <span class="material-icons">edit</span>
                </button>
            </header>
            <div class="detail-content" id="detail-content"></div>
        </div>

        <!-- Statistics Screen -->
        <div id="stats-screen" class="screen">
            <header class="app-bar">
                <button class="icon-btn" id="btn-stats-back">
                    <span class="material-icons">arrow_back</span>
                </button>
                <h1>Статистика</h1>
            </header>
            <div class="stats-content" id="stats-content"></div>
        </div>

        <!-- Bottom Sheet Overlay -->
        <div class="overlay hidden" id="overlay"></div>
        <div class="bottom-sheet hidden" id="bottom-sheet">
            <div class="sheet-header">
                <span class="material-icons" style="color: #673AB7;">add_circle</span>
                <span class="sheet-title" id="sheet-title">Новое событие</span>
                <button class="icon-btn" id="btn-sheet-close">
                    <span class="material-icons">close</span>
                </button>
            </div>
            <form id="event-form">
                <input type="hidden" id="form-event-id">
                <div class="form-field">
                    <span class="material-icons field-icon">title</span>
                    <input type="text" id="form-title" placeholder="Название" required>
                </div>
                <div class="form-field">
                    <span class="material-icons field-icon">description</span>
                    <input type="text" id="form-description" placeholder="Описание">
                </div>
                <div class="form-field">
                    <span class="material-icons field-icon">location_on</span>
                    <input type="text" id="form-location" placeholder="Место">
                </div>
                <div class="form-field">
                    <span class="material-icons field-icon">category</span>
                    <select id="form-category"></select>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <span class="material-icons field-icon">calendar_today</span>
                        <input type="date" id="form-date" required>
                    </div>
                    <div class="form-field">
                        <span class="material-icons field-icon">access_time</span>
                        <input type="time" id="form-time" required>
                    </div>
                </div>
                <div class="form-field">
                    <span class="material-icons field-icon">people</span>
                    <input type="text" id="form-participants" placeholder="Участники (через запятую)">
                </div>
                <button type="submit" class="btn-primary" id="btn-submit">
                    <span class="material-icons">check</span>
                    <span id="btn-submit-text">Создать событие</span>
                </button>
            </form>
        </div>

        <!-- Snackbar -->
        <div class="snackbar hidden" id="snackbar">
            <span id="snackbar-text"></span>
            <button id="snackbar-action" class="snackbar-btn">Отменить</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
